<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Admin Dashboard</h1>
    </header>

    <div style="padding:20px;">
        <h2>Add Product</h2>

        <input type="text" id="name" placeholder="Product Name"><br><br>

        <input type="number" id="price" placeholder="Price"><br><br>

        <input type="text" id="category" placeholder="Category"><br><br>

        <textarea id="details" placeholder="Product Details"></textarea><br><br>

        <button onclick="addProduct()">Add Product</button>
    </div>

    <div style="padding:20px;">
        <h2>Products</h2>
        <div id="admin-products"></div>
    </div>

    <script src="admin.js"></script>

</body>
</html>
